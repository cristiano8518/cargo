version: "3.9"

services:
  web:
    build: .
    container_name: cargo_web
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: "dev-only-secret-key-change-me"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
    volumes:
      - ./:/app
