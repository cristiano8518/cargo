{% extends "base.html" %}
{% block title %}Басты бет — Карго{% endblock %}
{% block content %}
  <div class="hero-cargo p-4 p-md-5 mb-4 rounded">
    <div class="col-lg-8 px-0">
      <h1 class="display-6 mb-3"><i class="bi bi-truck text-primary"></i> Карго жеткізу (Байерлік қызмет)</h1>
      <p class="lead my-3">
        Тапсырыс беріңіз, статусын бақылаңыз, баға мен маршруттарды қараңыз.
      </p>
      <p class="lead mb-0">
        {% if user.is_authenticated %}
          <a href="/orders/" class="btn btn-primary btn-lg"><i class="bi bi-box-seam"></i> Тапсырыстарға өту</a>
        {% else %}
          <a href="{% url 'users:signup' %}" class="btn btn-primary btn-lg"><i class="bi bi-person-plus"></i> Тіркелу</a>
          <a href="{% url 'login' %}" class="btn btn-outline-primary btn-lg"><i class="bi bi-box-arrow-in-right"></i> Кіру</a>
        {% endif %}
      </p>
    </div>
  </div>
{% endblock %}
