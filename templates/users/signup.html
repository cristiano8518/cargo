{% extends "base.html" %}
{% block title %}Тіркелу{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <h2 class="mb-3">Тіркелу</h2>
      <form method="post" class="card card-body">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary" type="submit">Тіркелу</button>
      </form>
      <p class="mt-3">Аккаунтыңыз бар ма? <a href="{% url 'login' %}">Кіру</a></p>
    </div>
  </div>
{% endblock %}
