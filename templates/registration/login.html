{% extends "base.html" %}
{% block title %}Кіру{% endblock %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
      <h2 class="mb-3"><i class="bi bi-box-arrow-in-right text-primary"></i> Кіру</h2>
      <form method="post" class="card card-body">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-primary w-100" type="submit"><i class="bi bi-box-arrow-in-right"></i> Кіру</button>
      </form>
      <p class="mt-3 text-center">Аккаунтыңыз жоқ па? <a href="{% url 'users:signup' %}">Тіркелу</a></p>
    </div>
  </div>
{% endblock %}
