{% extends "base.html" %}
{% block title %}Тапсырысты өшіру{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card border-danger shadow-sm">
      <div class="card-body">
        <h4 class="text-danger mb-3"><i class="bi bi-trash3"></i> Тапсырысты өшіру</h4>
        <p class="mb-3">Сіз расымен <strong>#{{ order.id }}</strong> тапсырысын өшіргіңіз келе ме?</p>
        <form method="post" action="{% url 'orders:delete' order.id %}" class="d-flex gap-2">
          {% csrf_token %}
          <button class="btn btn-danger" type="submit">Иә, өшіру</button>
          <a class="btn btn-outline-secondary" href="{% url 'orders:detail' order.id %}">Болдырмау</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
